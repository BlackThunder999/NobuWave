<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование | Sibiria Airlines</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 30px 0;
        }
        .header h1 { font-size: 2.2rem; margin-bottom: 15px; }
        .card {
            background: rgba(20, 25, 40, 0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        select, button, input {
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            margin: 5px;
        }
        button {
            background: #0066cc;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #0088ff; }
        button:disabled { background: #333; cursor: not-allowed; }
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            max-width: 400px;
            margin: 20px auto;
        }
        .seat {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid transparent;
            background: #1e3a5f;
            transition: 0.2s;
        }
        .seat:hover:not(.booked) { background: #2a5a8f; transform: scale(1.1); }
        .seat.booked { background: #661111; cursor: not-allowed; opacity: 0.6; }
        .seat.selected { background: #00aa44 !important; border-color: #00ff66; }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            margin-bottom: 20px;
        }
        #message {
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← На главную</a>
        <div class="header">
            <h1>🛫 Бронирование рейса</h1>
        </div>
        
        <div class="card">
            <h3>Выберите рейс:</h3>
            <select id="flightSelect" onchange="onFlightSelect()">
                <option value="">-- Загрузка... --</option>
            </select>
        </div>
        
        <div class="card" id="flightInfo" style="display:none;">
            <h3 id="flightTitle"></h3>
            <p id="flightRoute"></p>
            <p id="flightTime"></p>
            <p id="freeSeats" style="margin-top:10px;"></p>
            
            <h4 style="margin-top:25px;">Схема салона:</h4>
            <div class="seat-grid" id="seatMap"></div>
            <p id="selectedInfo" style="text-align:center;margin:10px;">Выберите место</p>
            <button id="bookBtn" disabled onclick="bookSeat()">Забронировать</button>
            <div id="message"></div>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://iljsednetiogjtowlexo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsanNlZG5ldGlvZ2p0b3dsZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcyOTUsImV4cCI6MjA5OTUwMzI5NX0.vkoXtCc_NnFfLqQqjMVlLxOcRZ-cTgjeIIBi2nikbWs'
        );
        
        let currentFlight = null;
        let selectedSeat = null;
        
        async function loadFlights() {
            const { data, error } = await supabase
                .from('flights')
                .select('*')
                .eq('status', 'scheduled')
                .order('departure_time');
            
            const select = document.getElementById('flightSelect');
            if (error || !data) {
                select.innerHTML = '<option>Ошибка загрузки рейсов</option>';
                return;
            }
            
            select.innerHTML = '<option value="">-- Выберите рейс --</option>';
            data.forEach(f => {
                select.innerHTML += `<option value="${f.id}">${f.flight_number} | ${f.departure} → ${f.arrival}</option>`;
            });
        }
        
        async function onFlightSelect() {
            const id = document.getElementById('flightSelect').value;
            if (!id) {
                document.getElementById('flightInfo').style.display = 'none';
                return;
            }
            
            const { data: flight } = await supabase
                .from('flights')
                .select('*')
                .eq('id', id)
                .single();
            
            if (!flight) return;
            currentFlight = flight;
            
            document.getElementById('flightInfo').style.display = 'block';
            document.getElementById('flightTitle').textContent = flight.flight_number;
            document.getElementById('flightRoute').textContent = `${flight.departure} → ${flight.arrival}`;
            document.getElementById('flightTime').textContent = 
                `Вылет: ${new Date(flight.departure_time).toLocaleString()}`;
            
            await loadSeats(id);
        }
        
        async function loadSeats(flightId) {
            const { data: booked } = await supabase
                .from('bookings')
                .select('seat_number')
                .eq('flight_id', flightId);
            
            const bookedSet = new Set(booked ? booked.map(b => b.seat_number) : []);
            const totalSeats = 242;
            const free = totalSeats - bookedSet.size;
            
            document.getElementById('freeSeats').textContent = 
                `Свободно мест: ${free} из ${totalSeats}`;
            
            const map = document.getElementById('seatMap');
            map.innerHTML = '';
            
            for (let row = 1; row <= 41; row++) {
                for (let col of ['A','B','C','D','E','F']) {
                    if (row === 41 && col > 'B') break;
                    
                    const seatNum = row + col;
                    const div = document.createElement('div');
                    div.className = 'seat';
                    div.textContent = seatNum;
                    
                    if (bookedSet.has(seatNum)) {
                        div.classList.add('booked');
                    } else {
                        div.onclick = () => selectSeat(seatNum, div);
                    }
                    
                    map.appendChild(div);
                }
            }
        }
        
        function selectSeat(seatNum, element) {
            document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
            element.classList.add('selected');
            selectedSeat = seatNum;
            document.getElementById('selectedInfo').textContent = 'Выбрано: ' + seatNum;
            document.getElementById('bookBtn').disabled = false;
        }
        
        async function bookSeat() {
            if (!currentFlight || !selectedSeat) return;
            
            const name = prompt('Имя пилота (ник в Roblox):') || 'Пилот';
            
            const { error } = await supabase
                .from('bookings')
                .insert({
                    flight_id: currentFlight.id,
                    seat_number: selectedSeat,
                    passenger_name: name
                });
            
            const msg = document.getElementById('message');
            if (error) {
                msg.style.background = '#661111';
                msg.textContent = '❌ Ошибка: ' + error.message;
            } else {
                msg.style.background = '#116633';
                msg.textContent = '✅ Место ' + selectedSeat + ' забронировано!';
                selectedSeat = null;
                document.getElementById('bookBtn').disabled = true;
                document.getElementById('selectedInfo').textContent = 'Выберите место';
                await onFlightSelect();
            }
        }
        
        loadFlights();
    </script>
</body>
</html>
