<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Sibiria Airlines</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1e, #1a1f2e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(20,25,40,0.95);
            border-radius: 20px;
            padding: 35px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            min-width: 350px;
            max-width: 400px;
        }
        h2 { margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            color: #fff;
            transition: 0.2s;
        }
        .btn-login { background: #0066cc; }
        .btn-crash { background: #cc0000; }
        .btn-land { background: #00aa44; }
        .btn-back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); }
        button:hover { opacity: 0.85; transform: translateY(-2px); }
        .stats-display { font-size: 1.3rem; margin: 20px 0; }
        .stats-display p { margin: 10px 0; }
        #errorMsg { color: #ff4444; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card" id="loginBox">
        <h2>⚙️ Админ-панель</h2>
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button class="btn-login" onclick="login()">Войти</button>
        <p id="errorMsg"></p>
        <br>
        <button class="btn-back" onclick="location.href='index.html'">← На главную</button>
    </div>
    
    <div class="card" id="adminPanel" style="display:none;">
        <h2>⚙️ Управление статистикой</h2>
        <div class="stats-display">
            <p>💥 Катастрофы: <strong id="crashCount">0</strong></p>
            <p>✅ Удачные посадки: <strong id="landCount">0</strong></p>
        </div>
        <button class="btn-crash" onclick="addCrash()">💥 +1 Катастрофа</button>
        <button class="btn-land" onclick="addLanding()">✅ +1 Удачная посадка</button>
        <br><br>
        <button class="btn-back" onclick="location.href='index.html'">← На главную</button>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://iljsednetiogjtowlexo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsanNlZG5ldGlvZ2p0b3dsZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcyOTUsImV4cCI6MjA5OTUwMzI5NX0.vkoXtCc_NnFfLqQqjMVlLxOcRZ-cTgjeIIBi2nikbWs'
        );
        
        function login() {
            const pass = document.getElementById('passwordInput').value;
            if (pass === 'Sibiria2026') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadStats();
            } else {
                document.getElementById('errorMsg').textContent = '❌ Неверный пароль!';
            }
        }
        
        async function loadStats() {
            const { data } = await supabase
                .from('stats')
                .select('*')
                .eq('id', 1)
                .single();
            
            if (data) {
                document.getElementById('crashCount').textContent = data.crashes;
                document.getElementById('landCount').textContent = data.successful_landings;
            }
        }
        
        async function addCrash() {
            const { data } = await supabase.from('stats').select('crashes').eq('id', 1).single();
            const newVal = (data?.crashes || 0) + 1;
            await supabase.from('stats').update({ crashes: newVal }).eq('id', 1);
            loadStats();
        }
        
        async function addLanding() {
            const { data } = await supabase.from('stats').select('successful_landings').eq('id', 1).single();
            const newVal = (data?.successful_landings || 0) + 1;
            await supabase.from('stats').update({ successful_landings: newVal }).eq('id', 1);
            loadStats();
        }
    </script>
</body>
</html>
