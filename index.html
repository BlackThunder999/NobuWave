<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sibiria Airlines Virtual | Главная</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(20, 25, 40, 0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .logo-text {
            font-size: 80px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stat-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #8892b0;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .stat-value.flights { color: #4dabf7; }
        .stat-value.crashes { color: #ff6b6b; }
        .stat-value.landings { color: #51cf66; }
        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            background: #0066cc;
            border: none;
            color: #ffffff;
            padding: 18px 35px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: #0088ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,100,255,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        @media (max-width: 500px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8rem; }
            .btn { padding: 15px 25px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-text">✈️</div>
        <h1>SIBIRIA AIRLINES VIRTUAL</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Всего рейсов</div>
                <div id="totalFlights" class="stat-value flights">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Катастроф</div>
                <div id="totalCrashes" class="stat-value crashes">...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Удачных посадок</div>
                <div id="totalLandings" class="stat-value landings">...</div>
            </div>
        </div>
        
        <div class="nav-buttons">
            <a href="booking.html" class="btn">🛫 Бронирование</a>
            <a href="dispatch.html" class="btn btn-secondary">📡 Диспетчерская</a>
            <a href="admin.html" class="btn btn-secondary">⚙️ Админ-панель</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://iljsednetiogjtowlexo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsanNlZG5ldGlvZ2p0b3dsZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcyOTUsImV4cCI6MjA5OTUwMzI5NX0.vkoXtCc_NnFfLqQqjMVlLxOcRZ-cTgjeIIBi2nikbWs';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function loadStats() {
            try {
                const { count: flightsCount, error: flightsError } = await supabase
                    .from('flights')
                    .select('*', { count: 'exact', head: true });
                
                if (!flightsError) {
                    document.getElementById('totalFlights').textContent = flightsCount || 0;
                }
                
                const { data: statsData, error: statsError } = await supabase
                    .from('stats')
                    .select('*')
                    .eq('id', 1)
                    .single();
                
                if (!statsError && statsData) {
                    document.getElementById('totalCrashes').textContent = statsData.crashes;
                    document.getElementById('totalLandings').textContent = statsData.successful_landings;
                }
            } catch (err) {
                console.error('Ошибка загрузки:', err);
            }
        }
        
        loadStats();
    </script>
</body>
</html>
