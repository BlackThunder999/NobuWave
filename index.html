<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>School Stealth 3D - Часть 1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
        }
        canvas {
            display: block;
        }

        /* Верхняя панель */
        #topUI {
            position: fixed;
            top: 8px;
            left: 8px;
            right: 8px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.7);
            padding: 6px 10px;
            border-radius: 8px;
            color: #fff;
            font-size: 11px;
            pointer-events: none;
        }
        #timeUI {
            color: #ffd700;
            font-weight: bold;
        }
        #staminaBar {
            flex: 1;
            height: 7px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        #staminaFill {
            height: 100%;
            width: 100%;
            background: #ffd700;
            transition: width 0.2s;
        }

        /* Нижние контроллы */
        #controlsUI {
            position: fixed;
            bottom: 15px;
            left: 8px;
            right: 8px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
        }
        #joystickZone {
            width: 110px;
            height: 110px;
            pointer-events: auto;
            position: relative;
        }
        #joystickBase {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.2);
            position: relative;
        }
        #joystickKnob {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            border: 2px solid rgba(255,255,255,0.5);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
        #rightControls {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
            pointer-events: auto;
        }
        .game-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .game-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.9);
        }
        .btn-run {
            border-color: #ffd700;
        }
        .btn-jump {
            border-color: #0bf;
        }

        #info {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="topUI">
        <span id="timeUI">🕐 08:30</span>
        <div id="staminaBar"><div id="staminaFill"></div></div>
    </div>

    <div id="controlsUI">
        <div id="joystickZone">
            <div id="joystickBase"><div id="joystickKnob"></div></div>
        </div>
        <div id="rightControls">
            <button class="game-btn btn-run" id="btnRun">🏃</button>
            <button class="game-btn btn-jump" id="btnJump">🦘</button>
        </div>
    </div>

    <div id="info">
        🕹️ Джойстик слева — ходить<br>
        🏃 Кнопка RUN — бежать<br>
        👆 Правая часть экрана — поворот камеры<br>
        💻 WASD — ходить | Shift — бежать
    </div>

    <script>
        // ==================== THREE.JS ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a0f0a);
        scene.fog = new THREE.Fog(0x1a0f0a, 15, 50);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 80);
        camera.position.set(0, 16, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // ==================== ОСВЕЩЕНИЕ ====================
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 0.7);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 60;
        dirLight.shadow.camera.left = -25;
        dirLight.shadow.camera.right = 25;
        dirLight.shadow.camera.top = 25;
        dirLight.shadow.camera.bottom = -25;
        scene.add(dirLight);

        // Лампы на стенах
        for (let z = -14; z <= 14; z += 7) {
            for (let x = -16; x <= 16; x += 8) {
                const pointLight = new THREE.PointLight(0xffcc88, 0.5, 10);
                pointLight.position.set(x, 3.5, z);
                pointLight.castShadow = true;
                scene.add(pointLight);
            }
        }

        // ==================== ПОЛ ====================
        const floorGeo = new THREE.PlaneGeometry(36, 36);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x3d2817, roughness: 0.9 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Плитка
        for (let z = -17; z < 18; z += 2) {
            for (let x = -17; x < 18; x += 2) {
                const tileGeo = new THREE.PlaneGeometry(1.8, 1.8);
                const tileMat = new THREE.MeshStandardMaterial({
                    color: Math.random() > 0.5 ? 0x4a3020 : 0x362318,
                    roughness: 0.85
                });
                const tile = new THREE.Mesh(tileGeo, tileMat);
                tile.rotation.x = -Math.PI / 2;
                tile.position.set(x + 1, 0.01, z + 1);
                tile.receiveShadow = true;
                scene.add(tile);
            }
        }

        // ==================== СТЕНЫ ====================
        function createWall(x, y, z, w, h, d, color = 0x8b7355) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7 });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.set(x, y, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            return wall;
        }

        // Внешние стены
        createWall(0, 2.5, -18, 36, 5, 0.5);
        createWall(0, 2.5, 18, 36, 5, 0.5);
        createWall(-18, 2.5, 0, 0.5, 5, 36);
        createWall(18, 2.5, 0, 0.5, 5, 36);

        // Внутренние стены (коридоры и классы)
        createWall(-7, 2.5, -9, 0.4, 5, 10, 0xa09080);
        createWall(7, 2.5, -9, 0.4, 5, 10, 0xa09080);
        createWall(-7, 2.5, 9, 0.4, 5, 10, 0xa09080);
        createWall(7, 2.5, 9, 0.4, 5, 10, 0xa09080);
        createWall(0, 2.5, -5, 14, 5, 0.4, 0xa09080);
        createWall(0, 2.5, 5, 14, 5, 0.4, 0xa09080);

        // ==================== ПАРТЫ ====================
        function createDesk(x, y, z) {
            const topGeo = new THREE.BoxGeometry(1.5, 0.1, 1);
            const topMat = new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.5 });
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.set(x, 0.9, z);
            top.castShadow = true;
            top.receiveShadow = true;
            scene.add(top);

            for (let lx = -0.5; lx <= 0.5; lx += 1) {
                const legGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.8);
                const legMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.5, metalness: 0.5 });
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(x + lx, 0.4, z + 0.35);
                leg.castShadow = true;
                scene.add(leg);
                const leg2 = new THREE.Mesh(legGeo, legMat);
                leg2.position.set(x + lx, 0.4, z - 0.35);
                leg2.castShadow = true;
                scene.add(leg2);
            }
        }

        // Парты в классах
        for (let row = 0; row < 3; row++) {
            for (let col = 0; col < 2; col++) {
                createDesk(-13 + col * 2, 0, -13 + row * 2);
                createDesk(13 - col * 2, 0, -13 + row * 2);
            }
        }

        // ==================== ИГРОК ====================
        const playerGeo = new THREE.CapsuleGeometry(0.35, 1, 4, 8);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.3 });
        const playerMesh = new THREE.Mesh(playerGeo, playerMat);
        playerMesh.position.set(0, 0.7, 0);
        playerMesh.castShadow = true;
        scene.add(playerMesh);

        // Глаза
        const eyeGeo = new THREE.SphereGeometry(0.07);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.1, 0.9, 0.3);
        playerMesh.add(leftEye);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(0.1, 0.9, 0.3);
        playerMesh.add(rightEye);

        // Тень под игроком
        const shadowGeo = new THREE.CircleGeometry(0.35, 16);
        const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
        const shadow = new THREE.Mesh(shadowGeo, shadowMat);
        shadow.rotation.x = -Math.PI / 2;
        shadow.position.y = 0.02;
        scene.add(shadow);

        // ==================== ПЕРЕМЕННЫЕ ====================
        let stamina = 100;
        const maxStamina = 100;
        let isRunning = false;
        let isJumping = false;
        let jumpVel = 0;
        let playerSpeed = 0.1;
        const runSpeed = 0.2;
        let joystickX = 0;
        let joystickY = 0;
        let joystickActive = false;
        let camAngle = 0;
        let keys = {};

        // ==================== ДЖОЙСТИК ====================
        const joystickZone = document.getElementById('joystickZone');
        const joystickKnob = document.getElementById('joystickKnob');

        joystickZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            joystickActive = true;
            updateJoystick(e.touches[0]);
        });
        joystickZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (joystickActive) updateJoystick(e.touches[0]);
        });
        joystickZone.addEventListener('touchend', () => {
            joystickActive = false;
            joystickX = 0;
            joystickY = 0;
            joystickKnob.style.transform = 'translate(-50%,-50%)';
        });

        function updateJoystick(touch) {
            const rect = joystickZone.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const maxDist = rect.width / 2 - 22;
            let dx = touch.clientX - cx;
            let dy = touch.clientY - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > maxDist) {
                dx = dx / dist * maxDist;
                dy = dy / dist * maxDist;
            }
            joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joystickX = dx / maxDist;
            joystickY = dy / maxDist;
        }

        // Поворот камеры (правая половина экрана)
        document.addEventListener('touchmove', (e) => {
            for (const touch of e.touches) {
                if (touch.clientX > window.innerWidth / 2 && !joystickActive) {
                    camAngle += (touch.movementX || 0) * 0.005;
                }
            }
        });

        // ==================== КНОПКИ ====================
        document.getElementById('btnRun').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (stamina > 0) isRunning = true;
        });
        document.getElementById('btnRun').addEventListener('touchend', () => {
            isRunning = false;
        });
        document.getElementById('btnJump').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!isJumping) {
                isJumping = true;
                jumpVel = 0.25;
            }
        });

        // ==================== КЛАВИАТУРА ====================
        document.addEventListener('keydown', (e) => { keys[e.key] = true; });
        document.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // ==================== ИГРОВОЙ ЦИКЛ ====================
        function update() {
            // Скорость
            let speed = isRunning ? runSpeed : playerSpeed;
            let moveX = 0;
            let moveZ = 0;

            // Джойстик
            if (joystickActive) {
                moveX = joystickX * speed;
                moveZ = -joystickY * speed;
            }

            // Клавиатура
            if (keys['w'] || keys['ArrowUp']) moveZ = -speed;
            if (keys['s'] || keys['ArrowDown']) moveZ = speed;
            if (keys['a'] || keys['ArrowLeft']) moveX = -speed;
            if (keys['d'] || keys['ArrowRight']) moveX = speed;
            if (keys['Shift'] && stamina > 0) isRunning = true;
            else if (!keys['Shift']) isRunning = false;
            if ((keys[' '] || keys['Space']) && !isJumping) {
                isJumping = true;
                jumpVel = 0.25;
            }

            // Стамина
            if (isRunning && (Math.abs(moveX) > 0 || Math.abs(moveZ) > 0)) {
                stamina = Math.max(0, stamina - 0.5);
                if (stamina <= 0) isRunning = false;
            } else {
                stamina = Math.min(maxStamina, stamina + 0.3);
            }

            // Прыжок
            if (isJumping) {
                playerMesh.position.y += jumpVel;
                jumpVel -= 0.015;
                if (playerMesh.position.y <= 0.7) {
                    playerMesh.position.y = 0.7;
                    isJumping = false;
                    jumpVel = 0;
                }
            }

            // Поворот движения
            const cos = Math.cos(camAngle);
            const sin = Math.sin(camAngle);
            const finalX = moveX * cos - moveZ * sin;
            const finalZ = moveX * sin + moveZ * cos;

            playerMesh.position.x += finalX;
            playerMesh.position.z += finalZ;

            // Границы
            playerMesh.position.x = Math.max(-17, Math.min(17, playerMesh.position.x));
            playerMesh.position.z = Math.max(-17, Math.min(17, playerMesh.position.z));

            // Тень
            shadow.position.x = playerMesh.position.x;
            shadow.position.z = playerMesh.position.z;

            // Камера
            const camX = playerMesh.position.x - Math.sin(camAngle) * 10;
            const camZ = playerMesh.position.z - Math.cos(camAngle) * 10;
            camera.position.set(camX, 14, camZ);
            camera.lookAt(playerMesh.position.x, 1, playerMesh.position.z);

            // UI
            document.getElementById('staminaFill').style.width = stamina + '%';
        }

        function gameLoop() {
            update();
            renderer.render(scene, camera);
            requestAnimationFrame(gameLoop);
        }

        // ==================== АДАПТАЦИЯ ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Убираем подсказку через 10 секунд
        setTimeout(() => {
            document.getElementById('info').style.display = 'none';
        }, 10000);

        gameLoop();
    </script>
</body>
</html>
