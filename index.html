<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>School Stealth 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#000; overflow:hidden; font-family:Arial,sans-serif; height:100vh; width:100vw; touch-action:manipulation; }
        canvas { display:block; position:fixed; top:0; left:0; z-index:1; }
        #menuScreen { position:fixed; inset:0; z-index:100; background:linear-gradient(135deg,#1a1a2e,#16213e,#0a0a0a); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:15px; }
        #menuScreen.hidden { display:none !important; }
        .menu-title { font-size:28px; color:#ffd700; text-align:center; text-shadow:0 0 20px rgba(255,215,0,0.5); }
        .menu-btn { width:200px; padding:16px; font-size:18px; font-weight:bold; border:2px solid #ffd700; background:rgba(255,215,0,0.15); color:#ffd700; border-radius:12px; cursor:pointer; z-index:101; position:relative; }
        .menu-btn:active { background:#ffd700; color:#000; transform:scale(0.95); }
        #topUI { position:fixed; top:8px; left:8px; right:8px; z-index:10; display:none; align-items:center; gap:6px; background:rgba(0,0,0,0.7); padding:6px 10px; border-radius:8px; color:#fff; font-size:11px; pointer-events:none; }
        #timeUI { color:#ffd700; font-weight:bold; min-width:55px; }
        #lessonUI { color:#fff; font-size:10px; margin:0 4px; }
        #suspicionBar { flex:1; height:7px; background:#333; border-radius:3px; overflow:hidden; }
        #suspicionFill { height:100%; width:0%; background:linear-gradient(90deg,#0f0,#ff0,#f00); transition:width 0.3s; }
        #staminaMiniBar { width:50px; height:5px; background:#333; border-radius:2px; overflow:hidden; }
        #staminaMiniFill { height:100%; width:100%; background:#ffd700; transition:width 0.2s; }
        #controlsUI { position:fixed; bottom:15px; left:8px; right:8px; z-index:10; display:none; justify-content:space-between; align-items:flex-end; pointer-events:none; }
        #joystickZone { width:110px; height:110px; pointer-events:auto; position:relative; }
        #joystickBase { width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.2); position:relative; }
        #joystickKnob { width:45px; height:45px; border-radius:50%; background:rgba(255,255,255,0.3); border:2px solid rgba(255,255,255,0.5); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
        #rightControls { display:flex; flex-direction:column; gap:6px; align-items:flex-end; pointer-events:auto; }
        .btn-row { display:flex; gap:6px; }
        .game-btn { width:50px; height:50px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.1); color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .game-btn:active { background:rgba(255,255,255,0.3); transform:scale(0.9); }
        .btn-run { border-color:#ffd700; } .btn-jump { border-color:#0bf; } .btn-action { border-color:#f69; width:60px; height:60px; font-size:26px; }
        #dialogBox { position:fixed; bottom:175px; left:8px; right:8px; z-index:15; background:rgba(0,0,0,0.92); border:2px solid #ffd700; border-radius:10px; padding:12px; color:#fff; font-size:13px; display:none; }
        #dialogBox.show { display:block; }
        #dialogName { color:#ffd700; font-weight:bold; margin-bottom:4px; }
        #dialogText { margin-bottom:8px; line-height:1.4; }
        #dialogBtns { display:flex; gap:6px; flex-wrap:wrap; }
        .dialog-btn { padding:8px 14px; background:rgba(255,215,0,0.1); border:1px solid #ffd700; color:#ffd700; border-radius:6px; cursor:pointer; font-size:12px; }
        .dialog-btn:active { background:#ffd700; color:#000; }
        #miniMap { position:fixed; top:45px; right:6px; width:65px; height:65px; z-index:8; display:none; border:2px solid rgba(255,255,255,0.3); border-radius:4px; overflow:hidden; background:rgba(0,0,0,0.6); }
        #miniMapCanvas { width:100%; height:100%; }
        #endScreen { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; gap:15px; }
        #endScreen.show { display:flex !important; }
        #endTitle { font-size:24px; color:#ffd700; } #endText { color:#fff; font-size:13px; text-align:center; max-width:280px; } #endScore { color:#888; font-size:12px; }
    </style>
</head>
<body>

<div id="menuScreen">
    <div class="menu-title">🏫 Школа Выживания 3D</div>
    <button class="menu-btn" onclick="startGame()">▶ ИГРАТЬ</button>
</div>

<div id="topUI">
    <span id="timeUI">🕐 08:30</span><span id="lessonUI"></span>
    <div id="suspicionBar"><div id="suspicionFill"></div></div>
    <div id="staminaMiniBar"><div id="staminaMiniFill"></div></div>
</div>

<div id="controlsUI">
    <div id="joystickZone"><div id="joystickBase"><div id="joystickKnob"></div></div></div>
    <div id="rightControls">
        <div class="btn-row">
            <button class="game-btn btn-run" id="btnRun">🏃</button>
            <button class="game-btn btn-jump" id="btnJump">🦘</button>
        </div>
        <button class="game-btn btn-action" id="btnAction">👋</button>
    </div>
</div>

<div id="dialogBox"><div id="dialogName"></div><div id="dialogText"></div><div id="dialogBtns"></div></div>
<div id="miniMap"><canvas id="miniMapCanvas"></canvas></div>

<div id="endScreen">
    <div id="endTitle"></div><div id="endText"></div><div id="endScore"></div>
    <button class="menu-btn" onclick="restartGame()">Играть заново</button>
</div>

<script>
// ==================== THREE.JS SETUP ====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a1a0a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.5, 80);
camera.position.set(0, 18, 22);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const mmCanvas = document.getElementById('miniMapCanvas');
const mmCtx = mmCanvas.getContext('2d');
mmCanvas.width = 65; mmCanvas.height = 65;

// Освещение
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(5, 15, 5);
sun.castShadow = true;
sun.shadow.mapSize.width = 1024;
sun.shadow.mapSize.height = 1024;
scene.add(sun);

// Пол
const floorGeo = new THREE.PlaneGeometry(36, 36);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x8b7355, roughness: 0.8 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Стены
function addWall(x, y, z, w, h, d, color) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
    const wall = new THREE.Mesh(geo, mat);
    wall.position.set(x, y, z);
    wall.castShadow = true;
    wall.receiveShadow = true;
    scene.add(wall);
}

// Внешние стены
addWall(0, 2.5, -18, 36, 5, 0.5, 0xc4a882);
addWall(0, 2.5, 18, 36, 5, 0.5, 0xc4a882);
addWall(-18, 2.5, 0, 0.5, 5, 36, 0xc4a882);
addWall(18, 2.5, 0, 0.5, 5, 36, 0xc4a882);

// Внутренние стены
addWall(-7, 2.5, -9, 0.4, 5, 10, 0xd4c4a8);
addWall(7, 2.5, -9, 0.4, 5, 10, 0xd4c4a8);
addWall(-7, 2.5, 9, 0.4, 5, 10, 0xd4c4a8);
addWall(7, 2.5, 9, 0.4, 5, 10, 0xd4c4a8);
addWall(0, 2.5, -5, 14, 5, 0.4, 0xd4c4a8);
addWall(0, 2.5, 5, 14, 5, 0.4, 0xd4c4a8);

// Парты
for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 2; col++) {
        // Левый класс
        const desk1 = new THREE.Mesh(
            new THREE.BoxGeometry(1.5, 0.1, 1),
            new THREE.MeshStandardMaterial({ color: 0xdeb887 })
        );
        desk1.position.set(-13 + col * 2, 0.8, -13 + row * 2);
        desk1.receiveShadow = true;
        scene.add(desk1);
        
        // Правый класс
        const desk2 = new THREE.Mesh(
            new THREE.BoxGeometry(1.5, 0.1, 1),
            new THREE.MeshStandardMaterial({ color: 0xdeb887 })
        );
        desk2.position.set(13 - col * 2, 0.8, -13 + row * 2);
        desk2.receiveShadow = true;
        scene.add(desk2);
    }
}

// Двери
const doors = [];
function addDoor(x, y, z, name) {
    const frame = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 3, 0.2),
        new THREE.MeshStandardMaterial({ color: 0x654321 })
    );
    frame.position.set(x, 1.5, z);
    scene.add(frame);
    
    const door = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 2.8, 0.1),
        new THREE.MeshStandardMaterial({ color: 0x8b6914 })
    );
    door.position.set(x, 1.4, z);
    door.userData = { name, isOpen: false, origX: x, openX: x + 0.7 };
    scene.add(door);
    doors.push(door);
}

addDoor(-9, 1.4, 0, '📐 Математика');
addDoor(9, 1.4, 0, '⚡ Физика');
addDoor(-4, 1.4, -5.2, '🚽 Туалет');
addDoor(4, 1.4, -5.2, '🏥 Медпункт');
addDoor(-4, 1.4, 5.2, '🗣️ Логопед');
addDoor(4, 1.4, 5.2, '🧥 Раздевалка');

// Игрок
const playerGroup = new THREE.Group();
const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.2, 8);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 0.6;
body.castShadow = true;
playerGroup.add(body);

const headGeo = new THREE.SphereGeometry(0.3, 8, 8);
const head = new THREE.Mesh(headGeo, new THREE.MeshStandardMaterial({ color: 0xffd700 }));
head.position.y = 1.4;
playerGroup.add(head);

playerGroup.position.set(0, 0, 0);
scene.add(playerGroup);

// Учителя
const teachers = [];
function addTeacher(x, y, z, color, mnx, mxx, mnz, mxz) {
    const group = new THREE.Group();
    
    const bGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.2, 8);
    const b = new THREE.Mesh(bGeo, new THREE.MeshStandardMaterial({ color }));
    b.position.y = 0.6;
    b.castShadow = true;
    group.add(b);
    
    const h = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0xffccaa })
    );
    h.position.y = 1.4;
    group.add(h);
    
    group.position.set(x, y, z);
    scene.add(group);
    
    teachers.push({
        mesh: group,
        mnx, mxx, mnz, mxz,
        dx: Math.random() > 0.5 ? 1 : -1,
        dz: Math.random() > 0.5 ? 1 : -1,
        sp: 0.03
    });
}

addTeacher(-11, 0, -10, 0xff4444, -16, -6, -15, -5);
addTeacher(11, 0, 10, 0x4444ff, 6, 16, 5, 15);
addTeacher(0, 0, -15, 0xff8844, -5, 5, -17, -10);

// NPC
const npcs = [];
function addNPC(x, y, z, color, name, dialogs) {
    const group = new THREE.Group();
    
    const bGeo = new THREE.CylinderGeometry(0.25, 0.25, 1, 8);
    const b = new THREE.Mesh(bGeo, new THREE.MeshStandardMaterial({ color }));
    b.position.y = 0.5;
    b.castShadow = true;
    group.add(b);
    
    const h = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0xffccaa })
    );
    h.position.y = 1.2;
    group.add(h);
    
    group.position.set(x, y, z);
    scene.add(group);
    npcs.push({ mesh: group, name, dialogs, x, z });
}

addNPC(-14, 0, 4, 0x88ff88, '🍺 Друн', ['Слышь... дай списать?', 'Я не пью, я существую в жидком состоянии.', 'Забей, я сам не знаю что задали.']);
addNPC(14, 0, -4, 0x8888ff, '🛋️ Скуф', ['На физру? Не, я тут посижу.', 'Мой диван — моя крепость.', 'Отстань, я отдыхаю.']);
addNPC(-8, 0, -12, 0xff88ff, '🧑‍⚕️ Медсестра', ['Что болит?', 'Температуры нет. Иди.', 'Ладно, держи справку.']);

// Укрытия
const hideouts = [
    { x: -4, z: -5.2, name: '🚽 Туалет', r: 2 },
    { x: 4, z: -5.2, name: '🏥 Медпункт', r: 2 },
    { x: -4, z: 5.2, name: '🗣️ Логопед', r: 2 },
    { x: 4, z: 5.2, name: '🧥 Раздевалка', r: 2 }
];

// Игровые переменные
let gameRunning = false;
let suspicion = 0;
let gameTime = 0;
let score = 0;
let stamina = 100;
let isRunning = false;
let joystickX = 0, joystickY = 0, joystickActive = false;
let camAngle = 0;
let keys = {};

// Сообщения
function showMsg(text) {
    const box = document.getElementById('dialogBox');
    document.getElementById('dialogName').textContent = '';
    document.getElementById('dialogText').textContent = text;
    document.getElementById('dialogBtns').innerHTML = '<button class="dialog-btn" onclick="document.getElementById(\'dialogBox\').classList.remove(\'show\')">OK</button>';
    box.classList.add('show');
    setTimeout(() => box.classList.remove('show'), 2500);
}

function showNPCDialog(npc) {
    const box = document.getElementById('dialogBox');
    const d = npc.dialogs[Math.floor(Math.random() * npc.dialogs.length)];
    document.getElementById('dialogName').textContent = npc.name;
    document.getElementById('dialogText').textContent = '"' + d + '"';
    let btns = '<button class="dialog-btn" onclick="document.getElementById(\'dialogBox\').classList.remove(\'show\')">Ладно</button>';
    if (npc.name.includes('Медсестра')) btns += '<button class="dialog-btn" onclick="getSickNote()">🤒 Притвориться больным</button>';
    document.getElementById('dialogBtns').innerHTML = btns;
    box.classList.add('show');
}

function getSickNote() {
    suspicion = Math.max(0, suspicion - 40);
    score += 150;
    document.getElementById('dialogBox').classList.remove('show');
    showMsg('🧑‍⚕️ Медсестра: "Держи справку на 10 минут!"');
}

// Взаимодействие
function interact() {
    const px = playerGroup.position.x;
    const pz = playerGroup.position.z;

    for (const door of doors) {
        const dx = px - door.position.x;
        const dz = pz - door.position.z;
        if (Math.sqrt(dx*dx + dz*dz) < 2.5) {
            door.userData.isOpen = !door.userData.isOpen;
            door.position.x = door.userData.isOpen ? door.userData.openX : door.userData.origX;
            showMsg(door.userData.isOpen ? '🚪 Открыто: ' + door.userData.name : '🚪 Закрыто');
            return;
        }
    }

    for (const h of hideouts) {
        const dx = px - h.x;
        const dz = pz - h.z;
        if (Math.sqrt(dx*dx + dz*dz) < h.r) {
            suspicion = Math.max(0, suspicion - 35);
            score += 100;
            showMsg(h.name + ': Спрятался! Подозрение -35%');
            return;
        }
    }

    for (const npc of npcs) {
        const dx = px - npc.x;
        const dz = pz - npc.z;
        if (Math.sqrt(dx*dx + dz*dz) < 2.8) {
            showNPCDialog(npc);
            return;
        }
    }
}

// Джойстик
const jz = document.getElementById('joystickZone');
const jk = document.getElementById('joystickKnob');

jz.addEventListener('touchstart', e => {
    e.preventDefault();
    joystickActive = true;
    updateJoy(e.touches[0]);
});
jz.addEventListener('touchmove', e => {
    e.preventDefault();
    if (joystickActive) updateJoy(e.touches[0]);
});
jz.addEventListener('touchend', () => {
    joystickActive = false;
    joystickX = 0; joystickY = 0;
    jk.style.transform = 'translate(-50%, -50%)';
});

function updateJoy(touch) {
    const r = jz.getBoundingClientRect();
    const cx = r.left + r.width/2;
    const cy = r.top + r.height/2;
    const md = r.width/2 - 22;
    let dx = touch.clientX - cx;
    let dy = touch.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > md) { dx = dx/dist*md; dy = dy/dist*md; }
    jk.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    joystickX = dx/md;
    joystickY = dy/md;
}

// Поворот камеры
document.addEventListener('touchmove', e => {
    for (const t of e.touches) {
        if (t.clientX > window.innerWidth/2 && !joystickActive) {
            camAngle += (t.movementX || 0) * 0.005;
        }
    }
});

// Кнопки
document.getElementById('btnRun').addEventListener('touchstart', e => {
    e.preventDefault();
    if (stamina > 0) isRunning = true;
});
document.getElementById('btnRun').addEventListener('touchend', () => { isRunning = false; });
document.getElementById('btnJump').addEventListener('touchstart', e => {
    e.preventDefault();
    // Простой прыжок
    playerGroup.position.y = 0.5;
    setTimeout(() => { playerGroup.position.y = 0; }, 300);
});
document.getElementById('btnAction').addEventListener('touchstart', e => {
    e.preventDefault();
    interact();
});

// Клавиатура
document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'e' || e.key === 'E') interact();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Игровой цикл
function update() {
    if (!gameRunning) return;

    const speed = isRunning ? 0.18 : 0.1;
    let mx = 0, mz = 0;

    if (joystickActive) { mx = joystickX*speed; mz = -joystickY*speed; }
    if (keys['w'] || keys['ArrowUp']) mz = -speed;
    if (keys['s'] || keys['ArrowDown']) mz = speed;
    if (keys['a'] || keys['ArrowLeft']) mx = -speed;
    if (keys['d'] || keys['ArrowRight']) mx = speed;
    if (keys['Shift'] && stamina > 0) isRunning = true;
    else if (!keys['Shift']) isRunning = false;

    if (isRunning && (Math.abs(mx) > 0 || Math.abs(mz) > 0)) {
        stamina = Math.max(0, stamina - 0.4);
        if (stamina <= 0) isRunning = false;
    } else {
        stamina = Math.min(100, stamina + 0.25);
    }

    const cos = Math.cos(camAngle);
    const sin = Math.sin(camAngle);
    playerGroup.position.x += mx*cos - mz*sin;
    playerGroup.position.z += mx*sin + mz*cos;
    playerGroup.position.x = Math.max(-17, Math.min(17, playerGroup.position.x));
    playerGroup.position.z = Math.max(-17, Math.min(17, playerGroup.position.z));

    camera.position.set(
        playerGroup.position.x - sin*12,
        16,
        playerGroup.position.z - cos*12
    );
    camera.lookAt(playerGroup.position.x, 1, playerGroup.position.z);

    // Учителя
    for (const t of teachers) {
        t.mesh.position.x += t.dx * t.sp;
        t.mesh.position.z += t.dz * t.sp;
        if (t.mesh.position.x > t.mxx || t.mesh.position.x < t.mnx) t.dx *= -1;
        if (t.mesh.position.z > t.mxz || t.mesh.position.z < t.mnz) t.dz *= -1;
        if (Math.random() < 0.01) { t.dx = Math.random() > 0.5 ? 1 : -1; t.dz = Math.random() > 0.5 ? 1 : -1; }

        const dx = playerGroup.position.x - t.mesh.position.x;
        const dz = playerGroup.position.z - t.mesh.position.z;
        if (Math.sqrt(dx*dx + dz*dz) < 2.5) {
            suspicion = Math.min(100, suspicion + 0.4);
            if (suspicion >= 100) endGame(false);
        }
    }

    let near = false;
    for (const t of teachers) {
        const dx = playerGroup.position.x - t.mesh.position.x;
        const dz = playerGroup.position.z - t.mesh.position.z;
        if (Math.sqrt(dx*dx + dz*dz) < 2.5) near = true;
    }
    if (!near) suspicion = Math.max(0, suspicion - 0.05);

    gameTime += 1/60;
    if (gameTime >= 360) endGame(true);

    document.getElementById('timeUI').textContent = '🕐 ' + String(Math.floor(8 + gameTime/60)).padStart(2,'0') + ':' + String(Math.floor(gameTime%60)).padStart(2,'0');
    document.getElementById('suspicionFill').style.width = suspicion + '%';
    document.getElementById('staminaMiniFill').style.width = stamina + '%';
    document.getElementById('lessonUI').textContent = gameTime < 45 ? '1 урок' : gameTime < 60 ? 'Перемена' : gameTime < 105 ? '2 урок' : gameTime < 120 ? 'Перемена' : gameTime < 165 ? '3 урок' : gameTime < 195 ? 'Большая перемена' : gameTime < 240 ? '4 урок' : gameTime < 255 ? 'Перемена' : gameTime < 300 ? '5 урок' : gameTime < 315 ? 'Перемена' : '6 урок';

    // Мини-карта
    mmCtx.fillStyle = 'rgba(0,0,0,0.8)';
    mmCtx.fillRect(0, 0, 65, 65);
    const sc = 65/36;
    for (const t of teachers) {
        mmCtx.fillStyle = '#f44';
        mmCtx.fillRect((t.mesh.position.x+18)*sc-1.5, (t.mesh.position.z+18)*sc-1.5, 3, 3);
    }
    mmCtx.fillStyle = '#ffd700';
    mmCtx.fillRect((playerGroup.position.x+18)*sc-2.5, (playerGroup.position.z+18)*sc-2.5, 5, 5);
}

function endGame(win) {
    gameRunning = false;
    document.getElementById('endScreen').classList.add('show');
    if (win && suspicion < 20) {
        document.getElementById('endTitle').textContent = '🏆 НИНДЗЯ!';
        document.getElementById('endText').textContent = 'Идеальный день!';
        score += 5000;
    } else if (win) {
        document.getElementById('endTitle').textContent = '👍 ВЫЖИЛ';
        document.getElementById('endText').textContent = 'День окончен!';
        score += 1000;
    } else {
        document.getElementById('endTitle').textContent = '💀 ПОЙМАН';
        document.getElementById('endText').textContent = 'Директор вызвал родителей...';
    }
    document.getElementById('endScore').textContent = 'Очки: ' + score;
}

function gameLoop() {
    update();
    renderer.render(scene, camera);
    requestAnimationFrame(gameLoop);
}

function startGame() {
    document.getElementById('menuScreen').classList.add('hidden');
    document.getElementById('topUI').style.display = 'flex';
    document.getElementById('controlsUI').style.display = 'flex';
    document.getElementById('miniMap').style.display = 'block';
    gameRunning = true;
    suspicion = 0;
    gameTime = 0;
    score = 0;
    stamina = 100;
    playerGroup.position.set(0, 0, 0);
    camAngle = 0;
}

function restartGame() {
    document.getElementById('endScreen').classList.remove('show');
    gameRunning = true;
    suspicion = 0;
    gameTime = 0;
    score = 0;
    stamina = 100;
    playerGroup.position.set(0, 0, 0);
    camAngle = 0;
    for (const t of teachers) {
        t.mesh.position.set((t.mnx+t.mxx)/2, 0, (t.mnz+t.mxz)/2);
    }
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

gameLoop();
</script>
</body>
</html>
