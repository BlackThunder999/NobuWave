<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диспетчерская | Sibiria Airlines</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1e, #1a1f2e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .card {
            background: rgba(20,25,40,0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { margin-bottom: 15px; color: #7eb8ff; }
        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin: 3px;
            color: #fff;
        }
        .btn-depart { background: #ff8800; }
        .btn-arrive { background: #00aa44; }
        .btn-delete { background: #cc3333; }
        .btn-send { background: #0066cc; }
        .flight-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 10px;
        }
        input[type="text"], input[type="password"] {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.3);
            color: #fff;
            width: 100%;
            margin-bottom: 10px;
        }
        .chat-box {
            height: 350px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .chat-input {
            display: flex;
            gap: 10px;
        }
        .chat-input input { margin-bottom: 0; }
        .msg { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .time { color: #777; font-size: 0.8rem; }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            margin-bottom: 20px;
        }
        #errorMsg { color: #ff4444; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← На главную</a>
        
        <div class="card" id="loginBox">
            <h2>🔐 Доступ в диспетчерскую</h2>
            <input type="password" id="passwordInput" placeholder="Пароль">
            <button class="btn-send" onclick="login()" style="width:100%;">Войти</button>
            <p id="errorMsg"></p>
        </div>
        
        <div id="mainContent" style="display:none;">
            <div class="card">
                <h2>📋 Управление рейсами</h2>
                <div id="flightsList">Загрузка...</div>
            </div>
            
            <div class="card">
                <h2>💬 Чат диспетчера</h2>
                <div class="chat-box" id="chatBox"></div>
                <div class="chat-input">
                    <input type="text" id="msgInput" placeholder="Введите сообщение...">
                    <button class="btn-send" onclick="sendMessage()">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://iljsednetiogjtowlexo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsanNlZG5ldGlvZ2p0b3dsZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjcyOTUsImV4cCI6MjA5OTUwMzI5NX0.vkoXtCc_NnFfLqQqjMVlLxOcRZ-cTgjeIIBi2nikbWs'
        );
        
        function login() {
            const pass = document.getElementById('passwordInput').value;
            if (pass === 'Sibiria2026') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                loadFlights();
                loadChat();
                subscribeToChanges();
            } else {
                document.getElementById('errorMsg').textContent = '❌ Неверный пароль!';
            }
        }
        
        async function loadFlights() {
            const { data, error } = await supabase
                .from('flights')
                .select('*')
                .order('departure_time');
            
            const list = document.getElementById('flightsList');
            if (error || !data) {
                list.innerHTML = 'Ошибка загрузки';
                return;
            }
            
            list.innerHTML = data.map(f => `
                <div class="flight-row">
                    <span>
                        <strong>${f.flight_number}</strong><br>
                        ${f.departure} → ${f.arrival}<br>
                        <small>Статус: ${f.status}</small>
                    </span>
                    <span>
                        ${f.status === 'scheduled' ? `<button class="btn-depart" onclick="updateFlight(${f.id}, 'departed')">✈️ Взлетел</button>` : ''}
                        ${f.status === 'departed' ? `<button class="btn-arrive" onclick="updateFlight(${f.id}, 'arrived')">🛬 Сел</button>` : ''}
                        <button class="btn-delete" onclick="deleteFlight(${f.id})">🗑️</button>
                    </span>
                </div>
            `).join('');
        }
        
        async function updateFlight(id, status) {
            await supabase.from('flights').update({ status }).eq('id', id);
            loadFlights();
        }
        
        async function deleteFlight(id) {
            if (confirm('Точно удалить рейс?')) {
                await supabase.from('flights').delete().eq('id', id);
                loadFlights();
            }
        }
        
        async function loadChat() {
            const { data } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50);
            
            const box = document.getElementById('chatBox');
            box.innerHTML = data ? data.map(m => `
                <div class="msg">
                    <strong>${m.sender}:</strong> ${m.text}
                    <span class="time">${new Date(m.created_at).toLocaleTimeString()}</span>
                </div>
            `).join('') : '';
            box.scrollTop = box.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            
            await supabase.from('messages').insert({
                text: text,
                sender: 'Диспетчер'
            });
            input.value = '';
        }
        
        function subscribeToChanges() {
            supabase
                .channel('realtime-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'flights' }, () => loadFlights())
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadChat())
                .subscribe();
        }
    </script>
</body>
</html>
